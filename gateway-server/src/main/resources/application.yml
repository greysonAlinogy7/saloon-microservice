server:
  port: 5000

spring:
  application:
    name: gateway-server

  cloud:
    gateway:
      server:
        webflux:

          # ==================== ROUTES ====================
          routes:
            - id: SALON-SERVICE
              uri: lb://SALON-SERVICE
              predicates:
                - Path=/api/salons/**,/api/admin/salons/**

            - id: BOOKING-SERVICE
              uri: lb://BOOKING-SERVICE
              predicates:
                - Path=/api/bookings/**

            - id: PAYMENT-SERVICE
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/api/payments/**

            - id: CATEGORY-SERVICE
              uri: lb://CATEGORY-SERVICE
              predicates:
                - Path=/api/categories/**

            - id: SERVICE-OFFERING-SERVICE
              uri: lb://SERVICE-OFFERING-SERVICE
              predicates:
                - Path=/api/service-offering/**

            - id: USER-SERVICE
              uri: lb://USER-SERVICE
              predicates:
                - Path=/auth/**,/api/user/**,/api/admin/users/**,/users/**

          # ==================== DEFAULT FILTERS ====================
          default-filters:
            # Fix: Add strategy explicitly (RETAIN_UNIQUE is safest for CORS)
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin, RETAIN_UNIQUE

          # ==================== GLOBAL CORS ====================
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"      # ← Change to your actual frontend port
                  - "http://localhost:4200"
                  - "http://localhost:5000"
                  # - "https://your-production-domain.com"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                exposedHeaders:
                  - Authorization
                  - Content-Disposition
                allowCredentials: true
                maxAge: 3600

          # HTTP Client
          httpclient:
            connect-timeout: 5000
            response-timeout: 10s

          discovery:
            locator:
              enabled: false

# ==================== EUREKA ====================
eureka:
  instance:
    hostname: localhost
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka/

# ==================== LOGGING ====================
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.cloud.gateway: DEBUG