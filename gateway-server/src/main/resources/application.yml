spring:
  application:
    name: gateway-server

server:
  port: 5000

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: BOOKING-SERVICE
          uri:
            "lb://BOOKING-SERVICE"
          predicates:
            - Path= "/api/bookings/**"



        - id:  PAYMENT-SERVICE
          uri:
             "lb://PAYMENT-SERVICE"
          predicates:
             - Path= "/api/payments/**"


        - id: CATEGORY-SERVICE
          uri:
            "lb://CATEGORY-SERVICE"
          predicates:
            - Path= "/api/categories/**"

        - id: SALON-SERVICE
          uri:
             "lb://SALON-SERVICE"
          predicates:
            - Path= "/salons/**",  "/api/salons/**", "/api/admin/salons/**"


        - id: SERVICE-OFFERING-SERVICE
          uri:
            "lb://SERVICE-OFFERING-SERVICE"
          predicates:
            - Path= "/api/service-offering/**"


        - id: USER-SERVICE
          uri:
            "lb://USER-SERVICE"
          predicates:
            - Path= "/api/user/**", "/api/admin/users/**", "/auth/**", "/users/**"


eureka:
  instance:
    hostname: localhost
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: "http://localhost:8070/eureka/"