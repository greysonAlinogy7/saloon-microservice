spring:
  application:
    name: gateway-server

  # === Spring Cloud Gateway (NEW namespace for 2025.x / Gateway 4.3+) ===
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          routes:
            - id: SALON-SERVICE
              uri: lb://SALON-SERVICE
              predicates:
                - Path=/api/salons/**,/api/admin/salons/**

            - id: BOOKING-SERVICE
              uri: lb://BOOKING-SERVICE
              predicates:
                - Path=/api/bookings/**

            - id: PAYMENT-SERVICE
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/api/payments/**

            - id: CATEGORY-SERVICE
              uri: lb://CATEGORY-SERVICE
              predicates:
                - Path=/api/categories/**

            - id: SERVICE-OFFERING-SERVICE
              uri: lb://SERVICE-OFFERING-SERVICE
              predicates:
                - Path=/api/service-offering/**

            - id: USER-SERVICE
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/user/**,/api/admin/users/**,/auth/**,/users/**



  # === OAuth2 Resource Server (Keycloak) ===
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/master   # Recommended for Keycloak

server:
  port: 5000

eureka:
  instance:
    hostname: localhost
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka/

# Optional: Helpful for debugging security issues
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.cloud.gateway: DEBUG